<!DOCTYPE html>
<html>
<head>
    <title>Smart Route AI</title>
</head>
<body>

<h1>AI Smart Route Finder</h1>

<label>Source:</label>
<input type="text" id="source"><br><br>

<label>Destination:</label>
<input type="text" id="destination"><br><br>

<button onclick="findRoute()">Find Route</button>

<h2 id="result"></h2>

<script>
function findRoute() {
    let source = document.getElementById("source").value;
    let destination = document.getElementById("destination").value;

    // Simple AI-based estimation

let distance = (source.length + destination.length) * 10; // fake distance logic

let time = Math.round(distance / 40); // assume 40 km/h avg speed

let fuelPrice = 100; // ₹ per litre
let mileage = 15; // km per litre

let cost = Math.round((distance / mileage) * fuelPrice);

// AI adjustment (traffic simulation)
let hour = new Date().getHours();

if (hour >= 8 && hour <= 11) {
    time += 10; // morning traffic
}
if (hour >= 17 && hour <= 20) {
    time += 15; // evening traffic
}

    document.getElementById("result").innerHTML =
        "Fastest Route: " + time + " mins <br> Estimated Cost: ₹" + cost;
}
</script>

</body>
</html>
