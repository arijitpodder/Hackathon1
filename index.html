<!DOCTYPE html>
<html>
<head>
<title>Smart Route AI</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin:0;
    font-family: 'Segoe UI';
    background: linear-gradient(135deg,#0f172a,#1e293b);
    color:white;
}

.container {
    width:750px;
    margin:30px auto;
}

.card-box {
    background:#1e293b;
    padding:20px;
    border-radius:15px;
    margin-bottom:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

h2 {
    text-align:center;
}

.section-title {
    margin:10px 0;
    font-weight:bold;
}

.grid {
    display:grid;
    grid-template-columns: repeat(3,1fr);
    gap:10px;
}

input {
    padding:10px;
    border-radius:8px;
    border:none;
}

button {
    padding:12px;
    background:#3b82f6;
    border:none;
    color:white;
    border-radius:8px;
    cursor:pointer;
}

.card {
    background:#334155;
    padding:12px;
    margin-top:10px;
    border-radius:10px;
}

.badge {
    padding:4px 8px;
    border-radius:6px;
    font-size:12px;
    margin-left:10px;
}

.cheapest { background:green; }
.fastest { background:orange; }

#map {
    height:350px;
    border-radius:10px;
}

.loading {
    text-align:center;
    margin:20px;
}
</style>
</head>

<body>

<div class="container">

<h2>🚀 Smart Route AI</h2>

<div class="card-box">
<div class="section-title">📍 Origin</div>
<div class="grid">
<input id="city1" placeholder="City">
<input id="pin1" placeholder="PIN">
<input id="state1" placeholder="State">
<input id="country1" placeholder="Country">
</div>

<div class="section-title">🎯 Destination</div>
<div class="grid">
<input id="city2" placeholder="City">
<input id="pin2" placeholder="PIN">
<input id="state2" placeholder="State">
<input id="country2" placeholder="Country">
</div>

<br>
<button onclick="findRoute()">Find Route</button>
</div>

<div id="result"></div>
<div id="map"></div>
<canvas id="chart"></canvas>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

let map = L.map('map').setView([22.57,88.36],5);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

function getDistance(lat1,lon1,lat2,lon2){
let R=6371;
let dLat=(lat2-lat1)*Math.PI/180;
let dLon=(lon2-lon1)*Math.PI/180;
let a=Math.sin(dLat/2)**2+
Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

async function findRoute(){

document.getElementById("result").innerHTML="<div class='loading'>⏳ Loading...</div>";
if(window.myChart) window.myChart.destroy();

let source = `${city1.value} ${pin1.value} ${state1.value} ${country1.value}`;
let dest = `${city2.value} ${pin2.value} ${state2.value} ${country2.value}`;

try{

let [sData,dData]=await Promise.all([
fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${source}`).then(r=>r.json()),
fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${dest}`).then(r=>r.json())
]);

let sLat=+sData[0].lat;
let sLon=+sData[0].lon;
let dLat=+dData[0].lat;
let dLon=+dData[0].lon;

map.eachLayer(l=>{
if(l instanceof L.Marker || l instanceof L.Polyline){
map.removeLayer(l);
}
});

L.marker([sLat,sLon]).addTo(map);
L.marker([dLat,dLon]).addTo(map);

let route=await fetch(`https://router.project-osrm.org/route/v1/driving/${sLon},${sLat};${dLon},${dLat}?overview=full&geometries=geojson`).then(r=>r.json());

let coords=route.routes[0].geometry.coordinates;
let line=L.polyline(coords.map(c=>[c[1],c[0]]),{color:'cyan'}).addTo(map);
map.fitBounds(line.getBounds());

let distance=getDistance(sLat,sLon,dLat,dLon);

let options=[];

// CAR (REALISTIC)
let carD=distance*1.3;
let carT=(carD/40)*60;
let carC=carD*25;
options.push({name:"🚗 Car",d:carD,t:carT,c:carC});

// TRAIN (CHEAP)
let trainD=distance*1.1;
let trainT=trainD<80?75:(trainD/55)*60;
let trainC=trainD<80?15:(trainD*0.5);
options.push({name:"🚆 Train",d:trainD,t:trainT,c:trainC});

// FLIGHT
if(distance>200){
let flightT=(distance/600)*60+90;
let flightC=2500+(distance*4);
options.push({name:"✈️ Flight",d:distance,t:flightT,c:flightC});
}

let cheapest=Math.min(...options.map(o=>o.c));
let fastest=Math.min(...options.map(o=>o.t));

let html="";

let labels=[],costs=[],times=[];

options.forEach(o=>{
let badge="";
if(o.c===cheapest) badge+="<span class='badge cheapest'>Cheapest</span>";
if(o.t===fastest) badge+="<span class='badge fastest'>Fastest</span>";

html+=`<div class="card">
${o.name} ${badge}<br>
Distance: ${o.d.toFixed(1)} km<br>
Time: ${o.t.toFixed(0)} mins<br>
Average Cost: ₹${Math.round(o.c)}
</div>`;

labels.push(o.name);
costs.push(o.c);
times.push(o.t);
});

// FLIGHT NOT AVAILABLE BOX
if(distance<=200){
html+=`<div class="card">✈️ Flight<br>❌ Not Available</div>`;
}

document.getElementById("result").innerHTML=html;

// GRAPH
window.myChart=new Chart(document.getElementById("chart"),{
type:'bar',
data:{
labels:labels,
datasets:[
{label:'Avg Cost ₹',data:costs,backgroundColor:'blue'},
{label:'Time (mins)',data:times,backgroundColor:'green'}
]
}
});

}catch{
document.getElementById("result").innerHTML="❌ Error fetching data";
}

}
</script>

</body>
</html>
