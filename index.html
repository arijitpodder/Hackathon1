<!DOCTYPE html>
<html>
<head>
<title>Smart Route AI</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body {
    margin:0;
    font-family: Arial;
    background: #0f172a;
    color:white;
}

.container {
    width: 650px;
    margin: 20px auto;
    padding: 20px;
    background: #1e293b;
    border-radius: 15px;
    animation: fadeIn 1s ease;
}

h3 {
    text-align:left;
    margin-left:20px;
}

input {
    width: 28%;
    padding: 10px;
    margin: 5px;
    border-radius: 5px;
    border:none;
}

select, button {
    padding: 10px;
    margin: 10px;
    border-radius: 5px;
}

button {
    background: #3b82f6;
    color:white;
    border:none;
    cursor:pointer;
}

#map {
    height: 350px;
    margin-top: 15px;
}

.card {
    background:#334155;
    padding:15px;
    margin:10px;
    border-radius:10px;
    text-align:left;
}

@keyframes fadeIn {
    from {opacity:0;}
    to {opacity:1;}
}
</style>
</head>

<body>

<div class="container">
<h2>🚀 Smart Route AI</h2>

<!-- ORIGIN -->
<h3>📍 Origin</h3>
<div>
<input id="city1" placeholder="City">
<input id="pin1" placeholder="PIN Code">
<input id="state1" placeholder="State">
</div>

<!-- DESTINATION -->
<h3>🎯 Destination</h3>
<div>
<input id="city2" placeholder="City">
<input id="pin2" placeholder="PIN Code">
<input id="state2" placeholder="State">
</div>

<select id="mode">
<option value="all">All Modes</option>
<option value="car">Car</option>
<option value="train">Train</option>
<option value="flight">Flight</option>
</select>

<button onclick="findRoute()">Find Routes</button>

<div id="result"></div>
<div id="map"></div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
let map = L.map('map').setView([22.57, 88.36], 5);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

async function findRoute() {

let source = document.getElementById("city1").value + " " +
             document.getElementById("pin1").value + " " +
             document.getElementById("state1").value;

let dest = document.getElementById("city2").value + " " +
           document.getElementById("pin2").value + " " +
           document.getElementById("state2").value;

let mode = document.getElementById("mode").value;

try {

let s = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${source}`);
let sData = await s.json();

let d = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${dest}`);
let dData = await d.json();

if(!sData.length || !dData.length){
document.getElementById("result").innerHTML="❌ Invalid Location";
return;
}

let sLat = parseFloat(sData[0].lat);
let sLon = parseFloat(sData[0].lon);
let dLat = parseFloat(dData[0].lat);
let dLon = parseFloat(dData[0].lon);

// Clear old markers/lines
map.eachLayer(layer=>{
if(layer instanceof L.Marker || layer instanceof L.Polyline){
map.removeLayer(layer);
}
});

L.marker([sLat,sLon]).addTo(map);
L.marker([dLat,dLon]).addTo(map);

// Draw route line
let line = L.polyline([[sLat,sLon],[dLat,dLon]], {color:'cyan'}).addTo(map);
map.fitBounds(line.getBounds());

// Distance logic
let straightDistance = getDistance(sLat,sLon,dLat,dLon);

let carDistance = straightDistance * 1.3;
let trainDistance = straightDistance * 1.1;
let flightDistance = straightDistance;

let html = "";

// CAR
if(mode==="all" || mode==="car"){
let time = carDistance/50*60;
let cost = (carDistance/15)*100;

html += `<div class="card">🚗 Car<br>
Distance: ${carDistance.toFixed(1)} km<br>
Time: ${time.toFixed(0)} mins<br>
Cost: ₹${Math.round(cost)}</div>`;
}

// TRAIN
if(mode==="all" || mode==="train"){
let time = trainDistance/80*60;
let cost = trainDistance*1;

html += `<div class="card">🚆 Train<br>
Distance: ${trainDistance.toFixed(1)} km<br>
Time: ${time.toFixed(0)} mins<br>
Cost: ₹${Math.round(cost)}</div>`;
}

// FLIGHT
if(mode==="all" || mode==="flight"){
let time = flightDistance/600*60;
let cost = flightDistance*5;

html += `<div class="card">✈️ Flight<br>
Distance: ${flightDistance.toFixed(1)} km<br>
Time: ${time.toFixed(0)} mins<br>
Cost: ₹${Math.round(cost)}</div>`;
}

document.getElementById("result").innerHTML = html;

}catch{
document.getElementById("result").innerHTML="⚠️ Error fetching data";
}
}

// Haversine Formula
function getDistance(lat1, lon1, lat2, lon2){
let R=6371;
let dLat=(lat2-lat1)*Math.PI/180;
let dLon=(lon2-lon1)*Math.PI/180;

let a=Math.sin(dLat/2)**2+
Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;

return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
</script>

</body>
</html>
