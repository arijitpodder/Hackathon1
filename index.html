<!DOCTYPE html>
<html>
<head>
<title>Smart Route AI</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#0f172a;
    color:white;
}

.container {
    width:700px;
    margin:20px auto;
    background:#1e293b;
    padding:20px;
    border-radius:15px;
}

input, select {
    padding:10px;
    margin:5px;
    border-radius:5px;
}

button {
    padding:10px;
    background:#3b82f6;
    color:white;
    border:none;
    border-radius:5px;
}

.card {
    background:#334155;
    padding:10px;
    margin:10px;
    border-radius:10px;
}

#map {
    height:350px;
    margin-top:15px;
    border-radius:10px;
}

canvas {
    background:white;
    margin-top:20px;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<h2>🚀 Smart Route AI</h2>

<h3>📍 Origin</h3>
<input id="city1" placeholder="City">
<input id="pin1" placeholder="PIN">
<input id="state1" placeholder="State">
<input id="country1" placeholder="Country">

<h3>🎯 Destination</h3>
<input id="city2" placeholder="City">
<input id="pin2" placeholder="PIN">
<input id="state2" placeholder="State">
<input id="country2" placeholder="Country">

<select id="mode">
<option value="all">All Modes</option>
<option value="car">Car</option>
<option value="train">Train</option>
<option value="flight">Flight</option>
</select>

<button onclick="findRoute()">Find Route</button>

<div id="result"></div>
<div id="map"></div>

<canvas id="chart"></canvas>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// MAP FIXED
let map = L.map('map').setView([22.57,88.36],5);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    maxZoom:19
}).addTo(map);

setTimeout(()=>map.invalidateSize(),500);

// MAIN FUNCTION
async function findRoute(){

let source = document.getElementById("city1").value + " " +
document.getElementById("pin1").value + " " +
document.getElementById("state1").value + " " +
document.getElementById("country1").value;

let dest = document.getElementById("city2").value + " " +
document.getElementById("pin2").value + " " +
document.getElementById("state2").value + " " +
document.getElementById("country2").value;

try{

let s=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${source}`);
let sData=await s.json();

let d=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${dest}`);
let dData=await d.json();

let sLat=parseFloat(sData[0].lat);
let sLon=parseFloat(sData[0].lon);
let dLat=parseFloat(dData[0].lat);
let dLon=parseFloat(dData[0].lon);

// CLEAR MAP
map.eachLayer(l=>{
if(l instanceof L.Marker || l instanceof L.Polyline){
map.removeLayer(l);
}
});

// MARKERS
L.marker([sLat,sLon]).addTo(map);
L.marker([dLat,dLon]).addTo(map);

// ROUTE LINE
let route=await fetch(`https://router.project-osrm.org/route/v1/driving/${sLon},${sLat};${dLon},${dLat}?overview=full&geometries=geojson`);
let data=await route.json();

let coords=data.routes[0].geometry.coordinates;
let latlngs=coords.map(c=>[c[1],c[0]]);

let line=L.polyline(latlngs,{color:'cyan'}).addTo(map);
map.fitBounds(line.getBounds());

setTimeout(()=>map.invalidateSize(),300);

// DISTANCE
let distance = getDistance(sLat,sLon,dLat,dLon);

// TRAFFIC (only car)
let hour=new Date().getHours();
let traffic=1;
if(hour>=8 && hour<=11) traffic=1.3;
if(hour>=17 && hour<=21) traffic=1.5;

let html="";
let costs=[];
let times=[];
let labels=[];

// 🚗 CAR
let carD = distance*1.3;
let carSpeed = carD>800 ? 70 : carD>300 ? 60 : 45;
let carT = (carD/carSpeed)*60*traffic;
if(carT<20) carT=20;

let fuelPrice=100, mileage=15;
let carC=(carD/mileage)*fuelPrice*traffic;

html+=card("🚗 Car",carD,carT,carC);
labels.push("Car"); costs.push(carC); times.push(carT);

// 🚆 TRAIN
let trainD = distance*1.1;
let trainT = (trainD/80)*60 + 30; // boarding time
if(trainT<75) trainT=75;

let trainC = 50 + (trainD*0.8);

html+=card("🚆 Train",trainD,trainT,trainC);
labels.push("Train"); costs.push(trainC); times.push(trainT);

// ✈️ FLIGHT
if(distance>200){
let flightD = distance;
let flightT = (flightD/600)*60 + 90; // airport time

let flightC = 2000 + (flightD*4);

html+=card("✈️ Flight",flightD,flightT,flightC);
labels.push("Flight"); costs.push(flightC); times.push(flightT);
}else{
html+=`<div class="card">✈️ Flight<br>❌ Not available</div>`;
}

document.getElementById("result").innerHTML=html;

// GRAPH
new Chart(document.getElementById("chart"),{
type:'bar',
data:{
labels:labels,
datasets:[
{
label:'Cost ₹',
data:costs,
backgroundColor:'blue'
},
{
label:'Time (mins)',
data:times,
backgroundColor:'green'
}
]
}
});

}catch{
document.getElementById("result").innerHTML="Error fetching data";
}
}

function card(name,d,t,c){
return `<div class="card">
${name}<br>
Distance: ${d.toFixed(1)} km<br>
Time: ${t.toFixed(0)} mins<br>
Cost: ₹${Math.round(c)}
</div>`;
}

// DISTANCE FORMULA
function getDistance(lat1,lon1,lat2,lon2){
let R=6371;
let dLat=(lat2-lat1)*Math.PI/180;
let dLon=(lon2-lon1)*Math.PI/180;

let a=Math.sin(dLat/2)**2+
Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;

return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

</script>

</body>
</html>
