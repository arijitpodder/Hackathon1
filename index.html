<script>
async function findRoute() {
    let source = document.getElementById("source").value;
    let destination = document.getElementById("destination").value;

    if (!source || !destination) {
        alert("Please enter both locations");
        return;
    }

    try {
        // Convert place to coordinates
        let srcRes = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${source}`);
        let srcData = await srcRes.json();

        let destRes = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${destination}`);
        let destData = await destRes.json();

        let srcLat = srcData[0].lat;
        let srcLon = srcData[0].lon;

        let destLat = destData[0].lat;
        let destLon = destData[0].lon;

        // Get route data from OSRM
        let routeRes = await fetch(
            `https://router.project-osrm.org/route/v1/driving/${srcLon},${srcLat};${destLon},${destLat}?overview=false`
        );
        let routeData = await routeRes.json();

        let distance = routeData.routes[0].distance / 1000; // km
        let time = routeData.routes[0].duration / 60; // minutes

        // Cost calculation
        let fuelPrice = 100;
        let mileage = 15;
        let cost = Math.round((distance / mileage) * fuelPrice);

        document.getElementById("result").innerHTML =
            `Distance: ${distance.toFixed(2)} km <br>
             Time: ${time.toFixed(0)} mins <br>
             Estimated Cost: ₹${cost}`;

    } catch (error) {
        document.getElementById("result").innerHTML = "Error fetching route data";
    }
}
</script>
